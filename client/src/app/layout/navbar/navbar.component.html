<header class="navbar">
  <!-- Page title -->
  <div class="navbar-left">
    <button class="hamburger-btn" (click)="layoutService.toggle()" aria-label="Toggle menu">
      <i class="pi pi-bars"></i>
    </button>
    <span class="page-title">{{ pageTitle() }}</span>
  </div>

  <div class="navbar-right">

    <!-- Dark / Light Theme Toggle -->
    <button
      class="icon-btn"
      (click)="toggleTheme()"
      [title]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
      aria-label="Toggle theme"
    >
      <i [class]="themeService.isDark() ? 'pi pi-sun' : 'pi pi-moon'"></i>
    </button>

    <!-- User Menu -->
    <div class="user-menu-wrapper">
      <button class="user-btn" (click)="toggleUserMenu()" aria-label="User menu">
        <div class="avatar">
          <i class="pi pi-user"></i>
        </div>
        <span class="user-display-name">{{ authService.user()?.name ?? 'User' }}</span>
        <i class="pi pi-chevron-down chevron" [class.rotated]="showUserMenu()"></i>
      </button>

      @if (showUserMenu()) {
        <div class="user-dropdown" role="menu">
          <div class="user-info">
            <div class="user-avatar-lg">
              <i class="pi pi-user"></i>
            </div>
            <div>
              <p class="user-name">{{ authService.user()?.name ?? 'User' }}</p>
              <p class="user-role">{{ authService.user()?.role ?? '' }}</p>
            </div>
          </div>
          <hr class="divider" />
          <button class="dropdown-item logout-item" (click)="logout()" role="menuitem">
            <i class="pi pi-sign-out"></i>
            <span>Logout</span>
          </button>
        </div>
      }
    </div>

  </div>
</header>
